name: Build and Release

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.38. Leave blank to build only."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IS_RELEASE="true"
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            IS_RELEASE="true"
            RELEASE_TAG="v${VERSION}"
          else
            VERSION="$(tr -d '[:space:]' < VERSION)"
            IS_RELEASE="false"
            RELEASE_TAG=""
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "is_release=${IS_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

  test:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install flake8

      - name: Check Python syntax
        run: |
          python -m py_compile setup.py main.py gui.py docs.py UIMode.py

      - name: Lint critical errors
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Run tests
        run: |
          python -m pytest tests/ -v
        if: hashFiles('tests/*.py') != ''

  build:
    needs:
      - prepare
      - test
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            data_separator: ";"
          - os: macos-latest
            platform: macos
            data_separator: ":"
          - os: ubuntu-latest
            platform: linux
            data_separator: ":"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app
        run: |
          pyinstaller --noconfirm --windowed --name LogDocumentationSystem --add-data "assets${{ matrix.data_separator }}assets" --add-data "docs.json${{ matrix.data_separator }}." setup.py

      - name: Package app
        shell: python
        env:
          APP_VERSION: ${{ needs.prepare.outputs.version }}
          APP_PLATFORM: ${{ matrix.platform }}
        run: |
          import os
          import shutil
          import tarfile
          from pathlib import Path

          version = os.environ["APP_VERSION"]
          platform = os.environ["APP_PLATFORM"]
          dist = Path("dist")
          base_name = f"log-documentation-system-{version}-{platform}"

          if platform == "linux":
              output = dist / f"{base_name}.tar.gz"
              with tarfile.open(output, "w:gz") as archive:
                  archive.add(dist / "LogDocumentationSystem", arcname="LogDocumentationSystem")
          else:
              source = dist / ("LogDocumentationSystem.app" if platform == "macos" else "LogDocumentationSystem")
              shutil.make_archive(str(dist / base_name), "zip", root_dir=source.parent, base_dir=source.name)

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: log-documentation-system-${{ needs.prepare.outputs.version }}-${{ matrix.platform }}
          path: |
            dist/log-documentation-system-*.zip
            dist/log-documentation-system-*.tar.gz
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.is_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Log Documentation System ${{ needs.prepare.outputs.version }}
          files: release-assets/*
          generate_release_notes: true
